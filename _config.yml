# Site Settings
locale                   : "en-US"
title                    : "Rosie Xiu"
title_separator          : "-"
name                     : &name "Rosie Xiu"
description              : &description "Ph.D. Researcher in Educational Psychology at USC. AI in Education · Learning Analytics · Mixed Methods."
url                      : https://rosiexiu.com
baseurl                  : ""
repository               : "rosiexiu/rosiexiu.github.io"
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : false
read_more                : "disabled"
talkmap_link             : false

comments:
  provider               :

atom_feed:
  path                   :

# SEO
google_site_verification :
bing_site_verification   :

# Social Sharing
twitter:
  username               :
og_image                 :
social:
  type                   : Person
  name                   : Rosie Xiu
  links:
    - "https://www.linkedin.com/in/rosiexiu"
    - "https://github.com/rosiexiu"
    - "https://scholar.google.com/citations?user=W9Wtyo8AAAAJ"

# Analytics
analytics:
  provider               :

# Site Author
author:
  name             : "Rosie Xiu"
  avatar           : "lele.png"
  bio              : "Ph.D. Researcher · Educational Psychology · USC<br>AI in Education · Learning Analytics · Mixed Methods"
  location         : "Los Angeles, California"
  employer         : "USC Rossier School of Education"
  googlescholar    : "https://scholar.google.com/citations?user=W9Wtyo8AAAAJ"
  email            : "lxiu@usc.edu"
  github           : "rosiexiu"
  linkedin         : "rosiexiu"
  uri              :
  researchgate     :
  orcid            :
  twitter          :
  instagram        :

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: false
      related: false
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: false
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: false
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: America/Los_Angeles

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
